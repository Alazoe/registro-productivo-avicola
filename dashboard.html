<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AviVet — Monitor de Producción</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#070b10; color:#e6edf3; font-family:'IBM Plex Mono','Courier New',monospace; font-size:13px; min-height:100vh; }
button { cursor:pointer; font-family:inherit; border:none; background:none; color:inherit; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#0d1117; }
::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }
#app { display:flex; flex-direction:column; min-height:100vh; }
#topbar { background:#0d1117; border-bottom:1px solid #21262d; padding:12px 24px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
#body { display:grid; grid-template-columns:210px 1fr; flex:1; }
#sidebar { background:#0d1117; border-right:1px solid #21262d; padding:18px 0; display:flex; flex-direction:column; }
#main { padding:22px 26px; overflow-y:auto; }
#footer { background:#0d1117; border-top:1px solid #21262d; padding:7px 24px; display:flex; justify-content:space-between; font-size:9px; color:#484f58; letter-spacing:1px; }
.logo { font-size:17px; font-weight:700; letter-spacing:2px; }
.logo span { color:#f0a500; }
.divider { width:1px; height:18px; background:#30363d; margin:0 14px; }
.label { font-size:9px; color:#484f58; letter-spacing:2px; margin-bottom:10px; }
.section { padding:0 14px 14px; border-bottom:1px solid #21262d; margin-bottom:14px; }
.granja-btn { width:100%; border-radius:7px; padding:9px 11px; display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; transition:background 0.15s; }
.lote-btn { width:100%; border-radius:6px; padding:7px 10px; display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
.badge { border-radius:10px; padding:1px 6px; font-size:9px; font-weight:700; }
.alert-tag { border-radius:4px; padding:1px 6px; font-size:9px; letter-spacing:1px; font-weight:700; }
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
.kpi-card { background:#0d1117; border:1px solid #21262d; border-radius:9px; padding:14px 16px; position:relative; overflow:hidden; }
.kpi-bar { position:absolute; top:0; left:0; right:0; height:2px; opacity:0.65; }
.kpi-label { font-size:9px; color:#8b949e; letter-spacing:2px; margin-bottom:8px; }
.kpi-value { font-size:22px; font-weight:700; line-height:1; }
.kpi-sub { font-size:10px; color:#8b949e; margin-top:6px; }
.chart-box { background:#0d1117; border:1px solid #21262d; border-radius:9px; padding:18px 16px; margin-bottom:18px; }
.clasif-box { background:#0d1117; border:1px solid #21262d; border-radius:9px; padding:18px 16px; }
.barra { display:flex; height:20px; border-radius:4px; overflow:hidden; gap:1px; margin-bottom:12px; }
.legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:4px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:10px; }
.legend-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.pending-box { margin-top:12px; border-radius:6px; padding:7px 12px; display:flex; align-items:center; gap:8px; font-size:11px; }
.alertas-panel { margin:14px 14px 0; background:rgba(255,59,59,0.06); border:1px solid rgba(255,59,59,0.2); border-radius:8px; padding:12px; }
.alert-row { display:flex; justify-content:space-between; margin-bottom:5px; font-size:10px; }
.estado-msg { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; gap:12px; }
.header-lote { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
.dias-badge { border-radius:10px; padding:12px 18px; text-align:center; min-width:80px; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div style="display:flex;align-items:center">
      <div class="logo">AVI<span>VET</span></div>
      <div class="divider"></div>
      <div style="font-size:10px;color:#8b949e;letter-spacing:2px">MONITOR DE PRODUCCIÓN</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div id="alerta-global"></div>
      <div id="fecha-hoy" style="font-size:11px;color:#8b949e;text-transform:capitalize"></div>
    </div>
  </div>
  <div id="body">
    <div id="sidebar">
      <div class="section">
        <div class="label">GRANJAS</div>
        <div id="lista-granjas"></div>
      </div>
      <div style="padding:0 14px">
        <div class="label" id="label-lotes">LOTES</div>
        <div id="lista-lotes"></div>
      </div>
      <div id="alertas-panel-sidebar"></div>
    </div>
    <div id="main">
      <div id="contenido"></div>
    </div>
  </div>
  <div id="footer">
    <span>AVIVET.CL · DR. ANDRÉS LAZO ESCOBAR · MV</span>
    <span id="fecha-consulta"></span>
  </div>
</div>

<script>
// ── CONFIGURACIÓN ─────────────────────────────────────────────────────────
const GRANJAS = [
  { id:"reinhard", nombre:"Reinhard",
    webAppUrl:"https://script.google.com/macros/s/AKfycbw-I_G2J0tp1qHb38NUACbqJ854m4Wm3wbKQNKSGP4AOu8vJF_GFoNMLl443WcZvC1CTQ/exec",
    color:"#f0a500", unidad:"Carro", tieneClasificacion:false },
  { id:"clarita", nombre:"Avícola Clarita",
    webAppUrl:"https://script.google.com/macros/s/AKfycbyRqXzKicCFBMb_VXxGXdEb0KpzaLP6I19HcMZqYohHQJCQi5CINvemDEKudEqzLmi2/exec",
    color:"#00d97e", unidad:"Lote", tieneClasificacion:true },
  { id:"gh", nombre:"Avícola GH",
    webAppUrl:"https://script.google.com/macros/s/AKfycbz_KZacc8oOBfhWAIbFMSfDqrxfhiAJr0xTdKHov2ShSwyHQh91JXkoRylWafmkc6M/exec",
    color:"#58a6ff", unidad:"Lote", tieneClasificacion:true },
];

const CATEGORIAS = [
  {key:"chico",   label:"Chico",    color:"#78909c"},
  {key:"mediano", label:"Mediano",  color:"#42a5f5"},
  {key:"grande",  label:"Grande",   color:"#26c6da"},
  {key:"xl",      label:"XL",       color:"#66bb6a"},
  {key:"superXl", label:"Super XL", color:"#ffca28"},
  {key:"jumbo",   label:"Jumbo",    color:"#ffa726"},
];
const NO_CONFORMES = [
  {key:"sucios",   label:"Sucios",   color:"#ef5350"},
  {key:"rotos",    label:"Rotos",    color:"#e53935"},
  {key:"trizados", label:"Trizados", color:"#b71c1c"},
  {key:"sangre",   label:"Sangre",   color:"#880e4f"},
];

// ── ESTADO ────────────────────────────────────────────────────────────────
const state = {
  granjaId: "reinhard",
  loteIdx:  0,
  datos:    {},
  estados:  {}
};

// ── HELPERS ───────────────────────────────────────────────────────────────
function alertColor(d){ return d===0?"#00d97e":d===1?"#f0a500":d===2?"#ff8c00":"#ff3b3b"; }
function alertLabel(d){ return d===0?"AL DÍA":d===1?"1 DÍA":d+" DÍAS"; }
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{ if(k==="style") Object.assign(e.style,v); else if(k==="class") e.className=v; else e[k]=v; });
  children.forEach(c=>{ if(c==null||c===false) return; if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(c)); else if(c instanceof Node) e.appendChild(c); });
  return e;
}
function set(id,node){ const c=document.getElementById(id); if(!c) return; c.innerHTML=""; if(node) c.appendChild(node); }
function setHTML(id,html){ const c=document.getElementById(id); if(c) c.innerHTML=html; }

// ── GRÁFICO SVG POSTURA ──────────────────────────────────────────────────
function buildChart(registros, color){
  const W=560, H=160, PL=36, PR=12, PT=10, PB=28;
  const data = (registros||[]).filter(r=>r.postura!=null||r.esperado!=null).slice(-28);
  if(!data.length) return el("div",{style:{color:"#484f58",fontSize:11,textAlign:"center",padding:"30px 0"}},"Sin datos para graficar");

  const all=[...data.map(r=>r.postura),...data.map(r=>r.esperado)].filter(v=>v!=null);
  const minV=Math.max(0, Math.floor(Math.min(...all)/10)*10);
  const maxV=Math.ceil(Math.max(...all)/10)*10 + 5;
  const W2=W-PL-PR, H2=H-PT-PB;
  const px=i=>(i/(data.length-1||1))*W2+PL;
  const py=v=>H-PB-((v-minV)/(maxV-minV||1))*H2;

  const svgNS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(svgNS,"svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width","100%");
  svg.setAttribute("height",H);
  svg.style.overflow="visible";

  // Grid
  for(let v=minV;v<=maxV;v+=5){
    const y=py(v);
    const g=document.createElementNS(svgNS,"line");
    g.setAttribute("x1",PL); g.setAttribute("y1",y);
    g.setAttribute("x2",W-PR); g.setAttribute("y2",y);
    g.setAttribute("stroke","#161b22"); g.setAttribute("stroke-width","1");
    svg.appendChild(g);
    if(v%10===0){
      const t=document.createElementNS(svgNS,"text");
      t.setAttribute("x",PL-4); t.setAttribute("y",y+4);
      t.setAttribute("text-anchor","end"); t.setAttribute("font-size","9");
      t.setAttribute("fill","#8b949e"); t.textContent=v+"%";
      svg.appendChild(t);
    }
  }

  // Fechas eje X
  const step=Math.max(1,Math.floor(data.length/7));
  data.forEach((r,i)=>{
    if(i%step===0||i===data.length-1){
      const t=document.createElementNS(svgNS,"text");
      t.setAttribute("x",px(i)); t.setAttribute("y",H-PB+14);
      t.setAttribute("text-anchor","middle"); t.setAttribute("font-size","8");
      t.setAttribute("fill","#8b949e");
      t.textContent=(r.fecha||"").slice(5);
      svg.appendChild(t);
    }
  });

  // Línea esperado
  const expData=data.filter((_,i)=>data[i].esperado!=null);
  if(expData.length>1){
    let d2="";
    data.forEach((r,i)=>{ if(r.esperado!=null) d2+=(d2?"L":"M")+px(i)+","+py(r.esperado); });
    const path=document.createElementNS(svgNS,"path");
    path.setAttribute("d",d2); path.setAttribute("fill","none");
    path.setAttribute("stroke","#30363d"); path.setAttribute("stroke-width","1.5");
    path.setAttribute("stroke-dasharray","4 2");
    svg.appendChild(path);
  }

  // Línea real
  let dReal="";
  data.forEach((r,i)=>{ if(r.postura!=null) dReal+=(dReal?"L":"M")+px(i)+","+py(r.postura); });
  if(dReal){
    const path=document.createElementNS(svgNS,"path");
    path.setAttribute("d",dReal); path.setAttribute("fill","none");
    path.setAttribute("stroke",color); path.setAttribute("stroke-width","2.5");
    svg.appendChild(path);
    // Puntos
    data.forEach((r,i)=>{
      if(r.postura==null) return;
      const c=document.createElementNS(svgNS,"circle");
      c.setAttribute("cx",px(i)); c.setAttribute("cy",py(r.postura)); c.setAttribute("r","3");
      c.setAttribute("fill",color);
      // Tooltip on hover via title
      const tt=document.createElementNS(svgNS,"title");
      tt.textContent=r.fecha+": "+r.postura+"%"+(r.esperado!=null?" (esp: "+r.esperado+"%)":"");
      c.appendChild(tt);
      svg.appendChild(c);
    });
  }
  return svg;
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────
function renderSidebar(){
  // Fecha
  document.getElementById("fecha-hoy").textContent =
    new Date().toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long"});

  // Granjas
  const frag=document.createDocumentFragment();
  GRANJAS.forEach(g=>{
    const d=state.datos[g.id], est=state.estados[g.id];
    const nA=(d?.lotes||[]).filter(l=>l.diasPendientes>0).length;
    const activa=state.granjaId===g.id;
    const btn=el("button",{
      class:"granja-btn",
      style:{ background:activa?g.color+"12":"none",
              border:activa?"1px solid "+g.color+"45":"1px solid transparent" },
      onclick:()=>{ state.granjaId=g.id; state.loteIdx=0; render(); }
    },
      el("div",{style:{display:"flex",alignItems:"center",gap:8}},
        el("div",{style:{width:7,height:7,borderRadius:"50%",
          background:activa?g.color:"#30363d",
          boxShadow:activa?"0 0 6px "+g.color:"none"}}),
        el("span",{style:{color:activa?g.color:"#8b949e",fontSize:11,fontWeight:activa?700:400}},g.nombre)
      )
    );
    if(est==="cargando") btn.appendChild(el("span",{style:{color:"#484f58",fontSize:10}},"···"));
    else if(est==="error") btn.appendChild(el("span",{style:{color:"#ff5252",fontSize:10}},"✗"));
    else if(est==="ok" && nA>0) btn.appendChild(el("span",{class:"badge",style:{background:"#ff5252",color:"#fff"}},nA));
    else if(est==="ok") btn.appendChild(el("span",{style:{color:"#00d97e",fontSize:10}},"✓"));
    frag.appendChild(btn);
  });
  set("lista-granjas",el("div",null,...Array.from(frag.childNodes).map(n=>n.cloneNode(true))));
  document.getElementById("lista-granjas").innerHTML="";
  GRANJAS.forEach(g=>{
    const d=state.datos[g.id], est=state.estados[g.id];
    const nA=(d?.lotes||[]).filter(l=>l.diasPendientes>0).length;
    const activa=state.granjaId===g.id;
    const btn=document.createElement("button");
    btn.className="granja-btn";
    Object.assign(btn.style,{background:activa?g.color+"12":"none",
      border:activa?"1px solid "+g.color+"45":"1px solid transparent"});
    btn.onclick=()=>{ state.granjaId=g.id; state.loteIdx=0; render(); };
    const left=document.createElement("div"); left.style.cssText="display:flex;align-items:center;gap:8px";
    const dot=document.createElement("div");
    Object.assign(dot.style,{width:"7px",height:"7px",borderRadius:"50%",
      background:activa?g.color:"#30363d",boxShadow:activa?"0 0 6px "+g.color:"none"});
    const nm=document.createElement("span");
    Object.assign(nm.style,{color:activa?g.color:"#8b949e",fontSize:"11px",fontWeight:activa?700:400});
    nm.textContent=g.nombre;
    left.append(dot,nm); btn.appendChild(left);
    if(est==="cargando"){ const s=document.createElement("span"); s.style.cssText="color:#484f58;font-size:10px"; s.textContent="···"; btn.appendChild(s); }
    else if(est==="error"){ const s=document.createElement("span"); s.style.cssText="color:#ff5252;font-size:10px"; s.textContent="✗"; btn.appendChild(s); }
    else if(est==="ok"&&nA>0){ const s=document.createElement("span"); s.className="badge"; Object.assign(s.style,{background:"#ff5252",color:"#fff"}); s.textContent=nA; btn.appendChild(s); }
    else if(est==="ok"){ const s=document.createElement("span"); s.style.cssText="color:#00d97e;font-size:10px"; s.textContent="✓"; btn.appendChild(s); }
    document.getElementById("lista-granjas").appendChild(btn);
  });

  // Lotes
  const granja=GRANJAS.find(g=>g.id===state.granjaId);
  const lotes=state.datos[state.granjaId]?.lotes||[];
  document.getElementById("label-lotes").textContent=granja.unidad.toUpperCase()+"S";
  const listaLotes=document.getElementById("lista-lotes");
  listaLotes.innerHTML="";
  lotes.forEach((l,i)=>{
    const dias=l.diasPendientes||0, ac=alertColor(dias), activo=state.loteIdx===i;
    const btn=document.createElement("button");
    btn.className="lote-btn";
    Object.assign(btn.style,{background:activo?"rgba(255,255,255,0.05)":"none",
      border:activo?"1px solid #30363d":"1px solid transparent"});
    btn.onclick=()=>{ state.loteIdx=i; render(); };
    const nm=document.createElement("span");
    Object.assign(nm.style,{color:activo?"#e6edf3":"#8b949e",fontSize:"11px"});
    nm.textContent=l.nombre;
    const tag=document.createElement("span");
    tag.className="alert-tag";
    Object.assign(tag.style,{background:ac+"18",color:ac,border:"1px solid "+ac+"45"});
    tag.textContent=alertLabel(dias);
    btn.append(nm,tag);
    listaLotes.appendChild(btn);
  });

  // Panel alertas globales
  const alertas=GRANJAS.flatMap(g=>{
    const d=state.datos[g.id]; if(!d) return [];
    return (d.lotes||[]).filter(l=>l.diasPendientes>0)
      .map(l=>({granja:g.nombre,lote:l.nombre,dias:l.diasPendientes,color:g.color}));
  }).sort((a,b)=>b.dias-a.dias);

  const sidebar=document.getElementById("alertas-panel-sidebar");
  sidebar.innerHTML="";
  if(alertas.length){
    const panel=document.createElement("div"); panel.className="alertas-panel";
    const ttl=document.createElement("div"); ttl.style.cssText="font-size:9px;color:#ff5252;letter-spacing:2px;margin-bottom:8px"; ttl.textContent="⚠ PENDIENTES";
    panel.appendChild(ttl);
    alertas.slice(0,6).forEach(a=>{
      const row=document.createElement("div"); row.className="alert-row";
      const lft=document.createElement("span"); lft.style.color="#8b949e";
      const dot=document.createElement("span"); dot.style.color=a.color; dot.textContent="● ";
      lft.append(dot,a.lote);
      const rgt=document.createElement("span"); Object.assign(rgt.style,{color:alertColor(a.dias),fontWeight:700}); rgt.textContent=a.dias+"d";
      row.append(lft,rgt); panel.appendChild(row);
    });
    sidebar.appendChild(panel);

    // Alerta global topbar
    const ag=document.getElementById("alerta-global");
    ag.innerHTML=""; const agEl=document.createElement("div");
    Object.assign(agEl.style,{background:"rgba(255,59,59,0.12)",border:"1px solid rgba(255,59,59,0.35)",
      borderRadius:"6px",padding:"4px 12px",fontSize:"11px",color:"#ff5252"});
    agEl.textContent="⚠ "+alertas.length+" "+(alertas.length===1?"lote":"lotes")+" con datos pendientes";
    ag.appendChild(agEl);
  } else {
    document.getElementById("alerta-global").innerHTML="";
  }
}

// ── RENDER MAIN ───────────────────────────────────────────────────────────
function renderMain(){
  const main=document.getElementById("contenido");
  main.innerHTML="";
  const est=state.estados[state.granjaId];
  const granja=GRANJAS.find(g=>g.id===state.granjaId);
  const datosG=state.datos[state.granjaId];
  const lotes=datosG?.lotes||[];
  const lote=lotes[state.loteIdx];

  if(!lote && est==="cargando"){
    main.innerHTML='<div class="estado-msg"><div style="color:#484f58">Cargando datos···</div></div>'; return;
  }
  if(!lote && est==="error"){
    main.innerHTML=`<div class="estado-msg"><div style="font-size:32px">⚠</div><div style="color:#ff5252">No se pudo conectar con ${granja.nombre}</div><div style="font-size:11px;color:#484f58;text-align:center;max-width:320px">Verifica que el Apps Script tenga getDashboard y esté publicado.</div></div>`; return;
  }
  if(!lote) return;

  // Header lote
  const ac=alertColor(lote.diasPendientes);
  const header=document.createElement("div"); header.className="header-lote";
  const hLeft=document.createElement("div");
  const hSub=document.createElement("div"); Object.assign(hSub.style,{fontSize:"10px",color:"#8b949e",letterSpacing:"2px",marginBottom:"4px"});
  hSub.textContent=granja.nombre.toUpperCase()+" · "+lote.nombre.toUpperCase();
  const hTitle=document.createElement("h2"); Object.assign(hTitle.style,{margin:"0",fontSize:"20px",fontWeight:"700"});
  hTitle.innerHTML=`Semana <span style="color:${granja.color}">${lote.semanaVida}</span> de vida <span style="font-size:12px;color:#8b949e;font-weight:400;margin-left:12px">${(lote.aves||0).toLocaleString("es-CL")} aves · último dato: ${lote.ultimaFecha}</span>`;
  hLeft.append(hSub,hTitle);
  const diasBadge=document.createElement("div"); diasBadge.className="dias-badge";
  Object.assign(diasBadge.style,{background:ac+"12",border:"1px solid "+ac+"45"});
  if(lote.diasPendientes===0){
    diasBadge.innerHTML=`<div style="font-size:22px;color:#00d97e">✓</div><div style="font-size:9px;color:#00d97e;letter-spacing:1px;margin-top:2px">AL DÍA</div>`;
  } else {
    diasBadge.innerHTML=`<div style="font-size:28px;font-weight:700;color:${ac};line-height:1">${lote.diasPendientes}</div><div style="font-size:9px;color:#8b949e;letter-spacing:1px;margin-top:4px">${lote.diasPendientes===1?"DÍA SIN":"DÍAS SIN"}<br>REGISTRO</div>`;
  }
  header.append(hLeft,diasBadge);
  main.appendChild(header);

  // KPIs
  const kpiGrid=document.createElement("div"); kpiGrid.className="kpi-grid";
  const kpis=[
    {label:"POSTURA",    value:lote.postura!=null?lote.postura+"%":"—",    color:granja.color,  sub:lote.posturaEsperada!=null?"Esperado: "+lote.posturaEsperada+"%":""},
    {label:"DIFERENCIA", value:lote.diferencia!=null?(lote.diferencia>0?"+":"")+lote.diferencia+"%":"—", color:lote.diferencia>=0?"#00d97e":"#ff5252", sub:lote.diferencia>=0?"↑ Sobre curva":"↓ Bajo curva"},
    {label:"MORTALIDAD", value:lote.mortalidadHoy!=null?lote.mortalidadHoy+" aves":"—", color:lote.mortalidadHoy>3?"#ff5252":"#00d97e", sub:lote.mortalidadHoy>3?"⚠ Alta":"Normal"},
    {label:"KG/AVE/DÍA", value:lote.kgAve!=null?lote.kgAve:"—", color:"#58a6ff", sub:(lote.huevos||0).toLocaleString("es-CL")+" huevos"},
  ];
  kpis.forEach(kpi=>{
    const card=document.createElement("div"); card.className="kpi-card";
    const bar=document.createElement("div"); bar.className="kpi-bar"; bar.style.background=kpi.color;
    const lbl=document.createElement("div"); lbl.className="kpi-label"; lbl.textContent=kpi.label;
    const val=document.createElement("div"); val.className="kpi-value"; val.style.color=kpi.color; val.textContent=kpi.value;
    const sub=document.createElement("div"); sub.className="kpi-sub"; sub.textContent=kpi.sub;
    card.append(bar,lbl,val,sub); kpiGrid.appendChild(card);
  });
  main.appendChild(kpiGrid);

  // Gráfico
  const chartBox=document.createElement("div"); chartBox.className="chart-box";
  const chartHdr=document.createElement("div"); Object.assign(chartHdr.style,{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"});
  const chartTtl=document.createElement("div"); Object.assign(chartTtl.style,{fontSize:"10px",color:"#8b949e",letterSpacing:"2px"}); chartTtl.textContent="CURVA DE POSTURA — ÚLTIMOS 28 DÍAS";
  const chartLgnd=document.createElement("div"); Object.assign(chartLgnd.style,{display:"flex",gap:"14px",fontSize:"10px",color:"#8b949e"});
  chartLgnd.innerHTML=`<span><span style="color:${granja.color}">● </span>Real</span><span><span style="color:#484f58">● </span>Esperado</span>`;
  chartHdr.append(chartTtl,chartLgnd);
  chartBox.appendChild(chartHdr);
  chartBox.appendChild(buildChart(lote.registros, granja.color));
  if(lote.diasPendientes>0){
    const pb=document.createElement("div"); pb.className="pending-box";
    Object.assign(pb.style,{background:ac+"0d",border:"1px dashed "+ac+"45",color:ac,marginTop:"12px"});
    pb.innerHTML=`⚠ Faltan <strong style="margin:0 4px">${lote.diasPendientes} ${lote.diasPendientes===1?"día":"días"}</strong> sin registrar desde el ${lote.ultimaFecha}`;
    chartBox.appendChild(pb);
  }
  main.appendChild(chartBox);

  // Clasificación
  if(granja.tieneClasificacion && lote.clasificacion){
    const clasif=lote.clasificacion;
    const totalCom=CATEGORIAS.reduce((s,c)=>s+(clasif[c.key]||0),0);
    const totalNC=NO_CONFORMES.reduce((s,c)=>s+(clasif[c.key]||0),0);
    const total=totalCom+totalNC;
    const pctNC=total>0?((totalNC/total)*100).toFixed(1):null;

    const box=document.createElement("div"); box.className="clasif-box";
    const chdr=document.createElement("div"); Object.assign(chdr.style,{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"});
    const ctitl=document.createElement("div"); Object.assign(ctitl.style,{fontSize:"10px",color:"#8b949e",letterSpacing:"2px"}); ctitl.textContent="CLASIFICACIÓN ÚLTIMO DÍA";
    const ctots=document.createElement("div"); Object.assign(ctots.style,{display:"flex",gap:"16px",fontSize:"10px"});
    ctots.innerHTML=`<span style="color:#8b949e">Total: <strong style="color:#e6edf3">${total.toLocaleString("es-CL")}</strong></span>`+(pctNC!==null?`<span style="color:${totalNC>0?"#ff5252":"#00d97e"}">No conf.: <strong>${pctNC}%</strong></span>`:"");
    chdr.append(ctitl,ctots); box.appendChild(chdr);

    if(totalCom>0){
      const barra=document.createElement("div"); barra.className="barra";
      CATEGORIAS.forEach(c=>{ const n=clasif[c.key]||0; if(!n) return; const seg=document.createElement("div"); Object.assign(seg.style,{width:((n/totalCom)*100)+"%",background:c.color,minWidth:"2px"}); seg.title=c.label+": "+n; barra.appendChild(seg); });
      box.appendChild(barra);
      const lgnd=document.createElement("div"); lgnd.className="legend";
      CATEGORIAS.forEach(c=>{ const n=clasif[c.key]||0; if(!n) return;
        const li=document.createElement("div"); li.className="legend-item";
        li.innerHTML=`<div class="legend-dot" style="background:${c.color}"></div><span style="color:#8b949e">${c.label}</span><span style="color:#e6edf3;font-weight:700">${n.toLocaleString("es-CL")}</span><span style="color:#484f58"> (${((n/totalCom)*100).toFixed(1)}%)</span>`;
        lgnd.appendChild(li);
      });
      box.appendChild(lgnd);
    }

    if(totalNC>0){
      const sep=document.createElement("div"); Object.assign(sep.style,{borderTop:"1px solid #21262d",paddingTop:"12px",marginTop:"12px"});
      const nclbl=document.createElement("div"); Object.assign(nclbl.style,{fontSize:"9px",color:"#ff5252",letterSpacing:"2px",marginBottom:"8px"}); nclbl.textContent="NO CONFORMES";
      const ncrow=document.createElement("div"); Object.assign(ncrow.style,{display:"flex",gap:"16px",flexWrap:"wrap"});
      NO_CONFORMES.forEach(c=>{ const n=clasif[c.key]||0; if(!n) return;
        const li=document.createElement("div"); li.className="legend-item";
        li.innerHTML=`<div class="legend-dot" style="background:${c.color}"></div><span style="color:#8b949e">${c.label}:</span><span style="color:#ff5252;font-weight:700">${n}</span>`;
        ncrow.appendChild(li);
      });
      sep.append(nclbl,ncrow); box.appendChild(sep);
    }

    if(total===0) box.innerHTML+='<div style="color:#484f58;font-size:11px;text-align:center;padding:12px 0">Sin datos de clasificación para el último día</div>';
    main.appendChild(box);
  }

  // Footer fecha consulta
  const fc=document.getElementById("fecha-consulta");
  if(datosG?.fechaConsulta) fc.textContent="Datos al "+datosG.fechaConsulta; else fc.textContent="";
}

// ── RENDER COMPLETO ───────────────────────────────────────────────────────
function render(){ renderSidebar(); renderMain(); }

// ── CARGA DATOS ───────────────────────────────────────────────────────────
function cargarGranja(g){
  state.estados[g.id]="cargando";
  render();
  fetch(g.webAppUrl+"?action=getDashboard")
    .then(r=>{ if(!r.ok) throw new Error(); return r.json(); })
    .then(json=>{ if(json.error) throw new Error(json.error); state.datos[g.id]=json; state.estados[g.id]="ok"; render(); })
    .catch(()=>{ state.estados[g.id]="error"; render(); });
}

// ── INIT ──────────────────────────────────────────────────────────────────
render();
GRANJAS.forEach(cargarGranja);
</script>
</body>
</html>
