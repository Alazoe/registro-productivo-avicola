<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AviVet — Monitor de Producción</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --fondo:    #f8f6f1;
  --papel:    #ffffff;
  --tinta:    #1a1a1a;
  --suave:    #555;
  --tenue:    #888;
  --linea:    #e0ddd5;
  --linea-f:  #c4c0b6;
  --prim:     #1b4332;
  --prim-osc: #133024;
  --acento:   #f0a500;
  --ok:       #1b5e20;
  --mal:      #b71c1c;
  --fuente-t: 'Crimson Pro', Georgia, serif;
  --fuente-c: 'Inter', system-ui, sans-serif;
  --fuente-m: 'IBM Plex Mono', ui-monospace, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--fuente-c);
  font-size: 14px; line-height: 1.6;
  color: var(--tinta); background: var(--fondo);
  -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }

/* LOGIN */
#login-screen {
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background: var(--fondo);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(27,67,50,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 90%, rgba(240,165,0,.05) 0%, transparent 50%);
}
#login-card {
  background: var(--papel); border: 1px solid var(--linea); border-radius: 4px;
  padding: 44px 40px; width: 360px; box-shadow: 0 4px 24px rgba(27,67,50,.08);
}
#login-card .marca { font-family: var(--fuente-t); font-size: 28px; font-weight: 700; color: var(--prim); text-align: center; margin-bottom: 4px; }
#login-card .marca span { color: var(--acento); }
#login-card .sub { font-family: var(--fuente-m); font-size: 10px; color: var(--tenue); letter-spacing: .1em; text-transform: uppercase; text-align: center; margin-bottom: 32px; }
#login-card label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--tenue); display: block; margin-bottom: 5px; }
#login-card input {
  width: 100%; font-family: var(--fuente-c); font-size: 14px;
  padding: 10px 13px; border: 1px solid var(--linea-f); border-radius: 4px;
  background: var(--fondo); color: var(--tinta); margin-bottom: 14px;
  transition: border-color .2s, box-shadow .2s; outline: none;
}
#login-card input:focus { border-color: var(--prim); box-shadow: 0 0 0 3px rgba(27,67,50,.1); }
#btn-login {
  width: 100%; background: var(--prim); color: #fff;
  font-family: var(--fuente-c); font-size: 14px; font-weight: 600;
  letter-spacing: .04em; padding: 12px; border-radius: 4px; transition: background .15s; margin-top: 4px;
}
#btn-login:hover:not(:disabled) { background: var(--prim-osc); }
#btn-login:disabled { opacity: .55; cursor: default; }
#login-error { color: var(--mal); font-size: 12px; margin-top: 10px; text-align: center; min-height: 16px; }

/* APP */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* HEADER */
#topbar {
  background: var(--prim); border-bottom: 3px solid var(--acento);
  padding: 13px 28px; display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 100;
}
.marca-top { display: flex; align-items: baseline; gap: 14px; }
.marca-titulo { font-family: var(--fuente-t); font-size: 22px; font-weight: 700; color: #fff; }
.marca-titulo span { color: var(--acento); }
.marca-sub-top { font-family: var(--fuente-m); font-size: 10px; color: rgba(255,255,255,.5); letter-spacing: .1em; text-transform: uppercase; }
.topbar-right { display: flex; align-items: center; gap: 20px; }
#fecha-hoy { font-family: var(--fuente-m); font-size: 11px; color: rgba(255,255,255,.5); text-transform: capitalize; }
.btn-logout {
  font-family: var(--fuente-m); font-size: 10px; letter-spacing: .08em;
  color: rgba(255,255,255,.6); padding: 4px 12px;
  border: 1px solid rgba(255,255,255,.25); border-radius: 3px; text-transform: uppercase; transition: all .18s;
}
.btn-logout:hover { color: #fff; border-color: rgba(255,255,255,.6); }

/* LAYOUT */
#body { display: grid; grid-template-columns: 220px 1fr; flex: 1; }

/* SIDEBAR */
#sidebar {
  background: var(--papel); border-right: 1px solid var(--linea);
  padding: 22px 0; display: flex; flex-direction: column;
}
.sidebar-section { padding: 0 16px 18px; border-bottom: 1px solid var(--linea); margin-bottom: 18px; }
.sidebar-section:last-of-type { border-bottom: none; margin-bottom: 0; }
.sidebar-label { font-family: var(--fuente-m); font-size: 9px; color: var(--tenue); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px; }
.granja-btn {
  width: 100%; border-radius: 4px; padding: 9px 10px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 3px; transition: background .12s; border: 1px solid transparent;
}
.granja-btn:hover { background: var(--fondo); }
.granja-btn.activa { background: var(--fondo); border-color: var(--linea); }
.granja-nombre { font-size: 13px; font-weight: 500; }
.lote-btn {
  width: 100%; border-radius: 3px; padding: 7px 10px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2px; transition: background .12s;
}
.lote-btn:hover { background: var(--fondo); }
.lote-btn.activo { background: var(--fondo); }
.lote-nombre { font-size: 13px; color: var(--suave); }
.lote-btn.activo .lote-nombre { color: var(--tinta); font-weight: 600; }
.alert-tag { font-family: var(--fuente-m); font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 3px; letter-spacing: .04em; }
.badge-num { font-family: var(--fuente-m); font-size: 9px; font-weight: 700; background: var(--mal); color: #fff; padding: 1px 7px; border-radius: 10px; }
.sidebar-alertas { margin: 0 12px; background: rgba(183,28,28,.05); border: 1px solid rgba(183,28,28,.2); border-radius: 4px; padding: 12px; }
.sidebar-alertas-titulo { font-family: var(--fuente-m); font-size: 9px; color: var(--mal); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; }
.alerta-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 11px; }

/* MAIN */
#main { padding: 28px 32px; overflow-y: auto; }

/* HEADER LOTE */
.lote-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; border-bottom: 1px solid var(--linea); padding-bottom: 20px; }
.lote-header-meta { font-family: var(--fuente-m); font-size: 10px; color: var(--tenue); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.lote-header-titulo { font-family: var(--fuente-t); font-size: 36px; font-weight: 700; line-height: 1.1; }
.lote-header-sub { font-size: 13px; color: var(--tenue); margin-top: 6px; }
.dias-badge { text-align: center; padding: 14px 20px; border-radius: 4px; min-width: 88px; border: 1px solid var(--linea); }
.dias-badge-num { font-family: var(--fuente-t); font-size: 44px; font-weight: 700; line-height: 1; }
.dias-badge-lbl { font-family: var(--fuente-m); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; margin-top: 4px; }

/* KPIs */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--linea); border: 1px solid var(--linea); margin-bottom: 24px; }
.kpi-card { background: var(--papel); padding: 20px 18px; position: relative; }
.kpi-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.kpi-label { font-family: var(--fuente-m); font-size: 9px; color: var(--tenue); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 10px; }
.kpi-value { font-family: var(--fuente-t); font-size: 40px; font-weight: 700; line-height: 1; }
.kpi-sub { font-size: 12px; color: var(--tenue); margin-top: 6px; }

/* CHART */
.chart-wrap { background: var(--papel); border: 1px solid var(--linea); padding: 22px 22px 18px; margin-bottom: 24px; }
.chart-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.chart-titulo { font-family: var(--fuente-m); font-size: 10px; color: var(--tenue); letter-spacing: .12em; text-transform: uppercase; }
.chart-controles { display: flex; align-items: center; gap: 16px; }
.vista-tabs { display: flex; border: 1px solid var(--linea-f); border-radius: 4px; overflow: hidden; }
.vista-tab {
  font-family: var(--fuente-m); font-size: 10px; letter-spacing: .06em;
  text-transform: uppercase; padding: 5px 14px; color: var(--tenue);
  background: var(--papel); border-right: 1px solid var(--linea-f);
  transition: all .15s;
}
.vista-tab:last-child { border-right: none; }
.vista-tab:hover { background: var(--fondo); color: var(--tinta); }
.vista-tab.activo { background: var(--prim); color: #fff; }
.chart-leyenda { display: flex; gap: 16px; font-size: 12px; color: var(--tenue); }
.chart-leyenda span { display: inline-flex; align-items: center; gap: 6px; }
.chart-canvas-wrap { position: relative; height: 230px; width: 100%; }
.pending-aviso {
  display: flex; align-items: center; gap: 8px; margin-top: 14px;
  padding: 9px 14px; border-radius: 3px; font-size: 12px; border: 1px dashed;
}

/* CLASIFICACIÓN */
.clasif-wrap { background: var(--papel); border: 1px solid var(--linea); padding: 22px; }
.clasif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.clasif-titulo { font-family: var(--fuente-m); font-size: 10px; color: var(--tenue); letter-spacing: .12em; text-transform: uppercase; }
.barra { display: flex; height: 18px; border-radius: 2px; overflow: hidden; gap: 1px; margin-bottom: 14px; }
.leyenda { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--suave); }
.leyenda-item { display: inline-flex; align-items: center; gap: 5px; }
.cuad { display: inline-block; width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.nc-titulo { font-family: var(--fuente-m); font-size: 9px; color: var(--mal); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; }

/* ESTADO VACÍO */
.estado-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 360px; gap: 12px; }
.estado-msg-titulo { font-family: var(--fuente-t); font-size: 22px; color: var(--tenue); }
.estado-msg-sub { font-size: 13px; color: var(--tenue); text-align: center; max-width: 380px; line-height: 1.6; }

/* ALERTA TOPBAR */
.alerta-top {
  font-family: var(--fuente-m); font-size: 10px; letter-spacing: .06em;
  padding: 4px 12px; border-radius: 3px;
  background: rgba(183,28,28,.25); color: #ffc4c4; border: 1px solid rgba(183,28,28,.4);
}

/* RESUMEN */
.btn-resumen {
  font-family: var(--fuente-m); font-size: 10px; letter-spacing: .08em;
  color: rgba(255,255,255,.7); padding: 5px 14px;
  border: 1px solid rgba(255,255,255,.35); border-radius: 3px;
  text-transform: uppercase; transition: all .18s; background: rgba(255,255,255,.08);
}
.btn-resumen:hover  { background: rgba(255,255,255,.18); color: #fff; }
.btn-resumen.activo { background: var(--acento); border-color: var(--acento); color: #fff; }

.resumen-wrap { max-width: 900px; }
.resumen-header { margin-bottom: 28px; border-bottom: 1px solid var(--linea); padding-bottom: 18px; }
.resumen-titulo { font-family: var(--fuente-t); font-size: 32px; font-weight: 700; color: var(--prim); line-height: 1.1; }
.resumen-periodo {
  font-family: var(--fuente-m); font-size: 10px; color: var(--tenue);
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px;
}
.resumen-aviso {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
  font-size: 12px; color: #e65100; background: rgba(230,81,0,.07);
  border: 1px solid rgba(230,81,0,.25); border-radius: 3px; padding: 5px 12px;
}
.resumen-acciones { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.btn-accion {
  font-family: var(--fuente-c); font-size: 13px; font-weight: 600;
  padding: 9px 20px; border-radius: 4px; transition: all .15s; display: inline-flex; align-items: center; gap: 7px;
}
.btn-accion.prim  { background: var(--prim); color: #fff; }
.btn-accion.prim:hover { background: var(--prim-osc); }
.btn-accion.sec   { background: var(--papel); color: var(--suave); border: 1px solid var(--linea-f); }
.btn-accion.sec:hover { border-color: var(--prim); color: var(--prim); }

.resumen-grid { display: grid; gap: 1px; background: var(--linea); border: 1px solid var(--linea); margin-bottom: 24px; }
.resumen-fila {
  display: grid;
  grid-template-columns: 180px 120px 80px 110px 110px 80px 90px;
  background: var(--papel);
  align-items: center;
}
.resumen-fila.cabecera { background: var(--prim); }
.resumen-cel {
  padding: 10px 14px; font-size: 13px; border-right: 1px solid var(--linea);
}
.resumen-cel:last-child { border-right: none; }
.resumen-fila.cabecera .resumen-cel {
  font-family: var(--fuente-m); font-size: 9px; letter-spacing: .1em;
  text-transform: uppercase; color: rgba(255,255,255,.75); border-right-color: rgba(255,255,255,.1);
}
.resumen-fila:not(.cabecera):hover { background: var(--fondo); }
.resumen-productor { font-weight: 600; font-size: 13px; }
.resumen-lote { font-size: 11px; color: var(--tenue); margin-top: 1px; }
.resumen-num { font-family: var(--fuente-t); font-size: 22px; font-weight: 700; line-height: 1; }
.resumen-sub { font-family: var(--fuente-m); font-size: 9px; color: var(--tenue); margin-top: 2px; }
.semaforo { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
.semaforo-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.delta-chip {
  font-family: var(--fuente-m); font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: 3px; display: inline-block;
}
.resumen-pendiente { background: repeating-linear-gradient(45deg, var(--fondo), var(--fondo) 4px, var(--papel) 4px, var(--papel) 8px); }
.resumen-pie { font-size: 12px; color: var(--tenue); line-height: 1.6; padding: 14px; background: var(--papel); border: 1px solid var(--linea); }

.nav-semana-btn {
  font-family: var(--fuente-m); font-size: 14px; font-weight: 700;
  width: 32px; height: 32px; border-radius: 4px;
  border: 1px solid var(--linea-f); background: var(--papel); color: var(--prim);
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.nav-semana-btn:hover:not(:disabled) { background: var(--prim); color: #fff; border-color: var(--prim); }
.nav-semana-btn:disabled { color: var(--linea-f); cursor: default; }

/* FOOTER */
#footer {
  background: var(--papel); border-top: 1px solid var(--linea);
  padding: 8px 28px; display: flex; justify-content: space-between;
  font-family: var(--fuente-m); font-size: 10px; color: var(--tenue); letter-spacing: .06em;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div id="login-card">
    <div class="marca">AVI<span>VET</span></div>
    <div class="sub">Monitor de Producción</div>
    <label for="login-email">Correo electrónico</label>
    <input type="email" id="login-email" autocomplete="email" placeholder="correo@ejemplo.com">
    <label for="login-pass">Contraseña</label>
    <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••">
    <button id="btn-login" onclick="login()">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <div class="marca-top">
      <div class="marca-titulo">AVI<span>VET</span></div>
      <div class="marca-sub-top">Monitor de Producción</div>
    </div>
    <div class="topbar-right">
      <div id="alerta-global"></div>
      <div id="fecha-hoy"></div>
      <button class="btn-resumen" id="btn-resumen" onclick="toggleResumen()">Resumen Semanal</button>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Productores</div>
        <div id="lista-granjas"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label" id="label-lotes">Lotes</div>
        <div id="lista-lotes"></div>
      </div>
      <div id="alertas-panel-sidebar"></div>
    </div>

    <div id="main">
      <div id="contenido"></div>
    </div>
  </div>

  <div id="footer">
    <span>AVIVET.CL · DR. ANDRÉS LAZO ESCOBAR · MV</span>
    <span id="fecha-consulta"></span>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────
let modoResumen = false;
let semanaOffset = 0; // 0 = semana automática, -1 = anterior, etc.
const SUPABASE_URL  = "https://xewujmpycclqjhlmiica.supabase.co";
const SUPABASE_ANON = "sb_publishable_v5_FU1w-7P7oeNrW6FYRBQ_cuX-pa9_";
const PALETTE = ["#1b4332","#1565c0","#6a1e9e","#b71c1c","#e65100","#00695c","#4527a0","#2e7d32"];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let currentToken = null;
let GRANJAS = [];
let chartInst = null;
let vistaActual = 'diario'; // 'diario' | 'semanal' | 'mensual'

const CATEGORIAS = [
  {key:"chico",   label:"Chico",    color:"#78909c"},
  {key:"mediano", label:"Mediano",  color:"#1565c0"},
  {key:"grande",  label:"Grande",   color:"#00838f"},
  {key:"xl",      label:"XL",       color:"#2e7d32"},
  {key:"superXl", label:"Super XL", color:"#f9a825"},
  {key:"jumbo",   label:"Jumbo",    color:"#ef6c00"},
];
const NO_CONFORMES = [
  {key:"sucios",   label:"Sucios",   color:"#c62828"},
  {key:"rotos",    label:"Rotos",    color:"#ad1457"},
  {key:"trizados", label:"Trizados", color:"#6a1e9e"},
  {key:"sangre",   label:"Sangre",   color:"#880e4f"},
];

const state = { granjaId:null, loteIdx:0, datos:{}, estados:{} };

// ── AUTH ───────────────────────────────────────────────────────────────
window.onload = async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) { currentToken = session.access_token; mostrarApp(); }
};

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('btn-login');
  if (!email || !pass) { errEl.textContent='Completa correo y contraseña'; return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  errEl.textContent = '';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    errEl.textContent = 'Correo o contraseña incorrectos';
    btn.disabled = false; btn.textContent = 'Entrar'; return;
  }
  currentToken = data.session.access_token;
  mostrarApp();
}

async function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  await sb.auth.signOut();
  currentToken = null;
  GRANJAS = []; Object.assign(state, { granjaId:null, loteIdx:0, datos:{}, estados:{} });
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Entrar';
}

function mostrarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('fecha-hoy').textContent =
    new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  render();
  cargarDatos();
}

// ── HELPERS ────────────────────────────────────────────────────────────
function alertColor(d) { return d===0?'var(--ok)':d<=1?'#e65100':d<=2?'#bf360c':'var(--mal)'; }
function alertLabel(d) { return d===0?'Al día':d===1?'1 día':d+' días'; }

// ── AGRUPACIONES ───────────────────────────────────────────────────────
function getLunes(fechaStr) {
  const d = new Date(fechaStr + 'T12:00:00');
  const dia = d.getDay(); // 0=Dom
  const diff = dia === 0 ? -6 : 1 - dia;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}

function agrupar(registros, vista) {
  if (vista === 'diario') {
    return registros.map(r => ({
      label: r.fecha.slice(5),   // MM-DD
      postura:  r.postura,
      esperado: r.esperado,
    }));
  }
  const grupos = {};
  registros.forEach(r => {
    const key = vista === 'semanal'
      ? getLunes(r.fecha)
      : r.fecha.slice(0, 7); // YYYY-MM
    if (!grupos[key]) grupos[key] = { key, posturas:[], esperados:[] };
    if (r.postura  != null) grupos[key].posturas.push(r.postura);
    if (r.esperado != null) grupos[key].esperados.push(r.esperado);
  });
  const avg = arr => arr.length ? parseFloat((arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1)) : null;
  return Object.values(grupos)
    .sort((a,b) => a.key.localeCompare(b.key))
    .map(g => ({
      label: vista === 'semanal'
        ? g.key.slice(5)                                      // MM-DD (lunes)
        : new Date(g.key + '-15').toLocaleDateString('es-CL', {month:'short', year:'2-digit'}),
      postura:  avg(g.posturas),
      esperado: avg(g.esperados),
    }));
}

// ── CHART ──────────────────────────────────────────────────────────────
function renderChart(lote, granja, vista) {
  const canvas = document.getElementById('chart-canvas');
  if (!canvas) return;
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const puntos = agrupar(lote.registros, vista);
  if (!puntos.length) {
    canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    return;
  }

  const color = granja.color;
  const colorAlpha = color + '20';

  chartInst = new Chart(canvas, {
    type: 'line',
    data: {
      labels: puntos.map(p => p.label),
      datasets: [
        {
          label: 'Postura real',
          data: puntos.map(p => p.postura),
          borderColor: color,
          backgroundColor: colorAlpha,
          borderWidth: 2.5,
          pointRadius: puntos.length > 60 ? 0 : 3.5,
          pointHoverRadius: 5,
          pointBackgroundColor: color,
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          tension: 0.3,
          fill: false,
          spanGaps: true,
        },
        {
          label: 'Esperado',
          data: puntos.map(p => p.esperado),
          borderColor: '#c4c0b6',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 4],
          pointRadius: 0,
          pointHoverRadius: 4,
          tension: 0.3,
          fill: false,
          spanGaps: true,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          titleColor: '#1a1a1a',
          bodyColor: '#555',
          borderColor: '#e0ddd5',
          borderWidth: 1,
          padding: 10,
          titleFont: { family: "'IBM Plex Mono'", size: 11 },
          bodyFont: { family: "'Inter'", size: 12 },
          callbacks: {
            title: items => {
              const lbl = items[0].label;
              if (vista === 'semanal') return 'Semana del ' + lbl;
              if (vista === 'mensual') return lbl;
              return lbl;
            },
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null) return null;
              return ' ' + ctx.dataset.label + ': ' + v + '%';
            },
          },
        },
      },
      scales: {
        x: {
          grid: { color: '#f0ede6', drawBorder: false },
          ticks: {
            font: { family: "'IBM Plex Mono'", size: 10 },
            color: '#aaa',
            maxRotation: 0,
            maxTicksLimit: vista === 'mensual' ? 12 : vista === 'semanal' ? 16 : 14,
          },
          border: { display: false },
        },
        y: {
          grid: { color: '#e0ddd5', drawBorder: false },
          ticks: {
            font: { family: "'IBM Plex Mono'", size: 10 },
            color: '#aaa',
            callback: v => v + '%',
            maxTicksLimit: 6,
          },
          border: { display: false },
        },
      },
    },
  });
}

// ── SUPABASE ───────────────────────────────────────────────────────────
async function sbFetch(tabla, params={}) {
  const url = new URL(SUPABASE_URL+'/rest/v1/'+tabla);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const r = await fetch(url.toString(), { headers: {
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer '+currentToken,
  }});
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

function procesarLote(lote, registros) {
  if (!registros.length) return null;
  const hoy = new Date().toISOString().slice(0,10);
  const u   = registros[0]; // más reciente
  const dias = Math.max(0, Math.round((new Date(hoy)-new Date(u.fecha))/86400000));
  const pct  = v => v!=null ? parseFloat((v*100).toFixed(1)) : null;
  return {
    nombre:          lote.nombre,
    semanaVida:      u.semana_vida,
    aves:            u.n_aves || lote.n_aves,
    ultimaFecha:     u.fecha,
    diasPendientes:  dias,
    postura:         pct(u.pct_postura),
    posturaEsperada: pct(u.pct_esperado),
    diferencia:      pct(u.diferencia),
    mortalidadHoy:   u.mortalidad,
    huevos:          u.n_huevos,
    gAlimPorHuevo:   (u.kg_alimento&&u.n_huevos) ? Math.round(u.kg_alimento*1000/u.n_huevos) : null,
    clasificacion: {
      chico:u.chico, mediano:u.mediano, grande:u.grande, xl:u.xl,
      superXl:u.super_xl, jumbo:u.jumbo, sucios:u.sucios,
      rotos:u.rotos, trizados:u.trizados, sangre:u.sangre,
    },
    // Todos los registros ordenados del más antiguo al más reciente
    registros: [...registros].reverse().map(r=>({
      fecha:      r.fecha,
      postura:    pct(r.pct_postura),
      esperado:   pct(r.pct_esperado),
      n_huevos:   r.n_huevos || 0,
      mortalidad: r.mortalidad || 0,
    })),
  };
}

// ── RESUMEN SEMANAL ────────────────────────────────────────────────────

function toggleResumen() {
  modoResumen = !modoResumen;
  semanaOffset = 0;
  document.getElementById('btn-resumen').classList.toggle('activo', modoResumen);
  document.getElementById('sidebar').style.display = modoResumen ? 'none' : '';
  document.getElementById('body').style.gridTemplateColumns = modoResumen ? '1fr' : '220px 1fr';
  if (modoResumen) renderResumen();
  else render();
}

function navegarSemana(delta) {
  semanaOffset += delta;
  renderResumen();
}

function getPeriodoSemana() {
  const hoy = new Date();
  const diaSem = hoy.getDay();
  const diasHastaDom = diaSem === 0 ? 7 : diaSem;
  const ultimoDom = new Date(hoy);
  ultimoDom.setDate(hoy.getDate() - diasHastaDom);
  const graciaPasa = new Date(ultimoDom);
  graciaPasa.setDate(ultimoDom.getDate() + 3);
  // Semana base (con gracia) + offset de navegación
  let domBase = hoy >= graciaPasa ? ultimoDom : new Date(ultimoDom.getTime() - 7*86400000);
  const domSemana = new Date(domBase.getTime() + semanaOffset * 7*86400000);
  const lunSemana = new Date(domSemana);
  lunSemana.setDate(domSemana.getDate() - 6);
  const fmt = d => d.toISOString().slice(0,10);
  const esActual = semanaOffset === 0;
  return { inicio: fmt(lunSemana), fin: fmt(domSemana), esActual };
}

function getPeriodoMesAnterior() {
  const hoy = new Date();
  const mesAnt = hoy.getMonth() === 0 ? 11 : hoy.getMonth() - 1;
  const anioAnt = hoy.getMonth() === 0 ? hoy.getFullYear()-1 : hoy.getFullYear();
  const primerDia = `${anioAnt}-${String(mesAnt+1).padStart(2,'0')}-01`;
  const ultimoDia = new Date(hoy.getFullYear(), hoy.getMonth(), 0);
  return {
    inicio:   primerDia,
    fin:      ultimoDia.toISOString().slice(0,10),
    etiqueta: new Date(anioAnt, mesAnt, 15).toLocaleDateString('es-CL', {month:'long', year:'numeric'}),
  };
}

function calcularPromedioRegistros(registros, fechaInicio, fechaFin) {
  const filtrados = registros.filter(r => r.fecha >= fechaInicio && r.fecha <= fechaFin);
  if (!filtrados.length) return null;
  const posturas = filtrados.map(r => r.postura).filter(v => v != null);
  if (!posturas.length) return null;
  return parseFloat((posturas.reduce((a,b)=>a+b,0) / posturas.length).toFixed(1));
}

function renderResumen() {
  const main = document.getElementById('contenido');
  main.innerHTML = '';
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const semana = getPeriodoSemana();
  const mes    = getPeriodoMesAnterior();

  const fmtFecha = s => new Date(s+'T12:00:00').toLocaleDateString('es-CL', {day:'numeric',month:'short'});

  // ── Header ──
  const wrap = document.createElement('div'); wrap.className = 'resumen-wrap';

  const hdr = document.createElement('div'); hdr.className = 'resumen-header';
  const hdrTop = document.createElement('div');
  hdrTop.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px';

  const hdrLeft = document.createElement('div');
  const periodo = document.createElement('div'); periodo.className = 'resumen-periodo';
  periodo.textContent = 'Resumen semanal';
  const titulo = document.createElement('div'); titulo.className = 'resumen-titulo';
  titulo.textContent = fmtFecha(semana.inicio) + ' — ' + fmtFecha(semana.fin);
  hdrLeft.append(periodo, titulo);

  // Navegador de semanas
  const nav = document.createElement('div');
  nav.style.cssText = 'display:flex;align-items:center;gap:6px;padding-top:4px';
  const btnPrev = document.createElement('button');
  btnPrev.className = 'nav-semana-btn'; btnPrev.textContent = '←';
  btnPrev.title = 'Semana anterior'; btnPrev.onclick = () => navegarSemana(-1);
  const btnNext = document.createElement('button');
  btnNext.className = 'nav-semana-btn'; btnNext.textContent = '→';
  btnNext.title = 'Semana siguiente';
  btnNext.disabled = semana.esActual;
  btnNext.onclick = () => navegarSemana(1);
  const labelSem = document.createElement('span');
  labelSem.style.cssText = 'font-family:var(--fuente-m);font-size:10px;color:var(--tenue);letter-spacing:.06em;padding:0 4px;min-width:70px;text-align:center';
  labelSem.textContent = semana.esActual ? 'Actual' : (semanaOffset < 0 ? Math.abs(semanaOffset)+(Math.abs(semanaOffset)===1?' sem ':' sem ')+' atrás' : semanaOffset+' sem adelante');
  nav.append(btnPrev, labelSem, btnNext);

  hdrTop.append(hdrLeft, nav);
  hdr.appendChild(hdrTop);

  // Verificar si hay lotes con datos incompletos en la semana
  const pendientes = [];
  GRANJAS.forEach(g => {
    const d = state.datos[g.id]; if (!d) return;
    d.lotes.forEach(l => {
      const enSemana = l.registros.filter(r => r.fecha >= semana.inicio && r.fecha <= semana.fin);
      if (enSemana.length < 5) pendientes.push(g.nombre + ' / ' + l.nombre);
    });
  });
  if (pendientes.length) {
    const aviso = document.createElement('div'); aviso.className = 'resumen-aviso';
    aviso.innerHTML = `⚠ ${pendientes.length} lote${pendientes.length>1?'s':''} con datos incompletos esta semana`;
    hdr.appendChild(aviso);
  }
  wrap.appendChild(hdr);

  // ── Acciones ──
  const acciones = document.createElement('div'); acciones.className = 'resumen-acciones';
  const btnPrint = document.createElement('button');
  btnPrint.className = 'btn-accion prim';
  btnPrint.innerHTML = '🖨 Imprimir / PDF';
  btnPrint.onclick = () => window.print();
  const btnCopiar = document.createElement('button');
  btnCopiar.className = 'btn-accion sec';
  btnCopiar.innerHTML = '📋 Copiar texto';
  btnCopiar.onclick = () => copiarResumenTexto(semana, mes);
  acciones.append(btnPrint, btnCopiar);
  wrap.appendChild(acciones);

  // ── Tabla ──
  const grid = document.createElement('div'); grid.className = 'resumen-grid';

  // Cabecera
  const cab = document.createElement('div'); cab.className = 'resumen-fila cabecera';
  ['Productor / Lote','Estado','Sem. vida','Postura sem.','Mes ant. ('+mes.etiqueta.split(' ')[0]+')','Δ vs mes','Huevos sem.']
    .forEach(t => { const c=document.createElement('div'); c.className='resumen-cel'; c.textContent=t; cab.appendChild(c); });
  grid.appendChild(cab);

  // Filas por lote
  let hayDatos = false;
  GRANJAS.forEach((g, gi) => {
    const d = state.datos[g.id]; if (!d) return;
    d.lotes.forEach(l => {
      hayDatos = true;
      const semRegistros = l.registros.filter(r => r.fecha >= semana.inicio && r.fecha <= semana.fin);
      const mesRegistros = l.registros.filter(r => r.fecha >= mes.inicio && r.fecha <= mes.fin);

      const pSem = calcularPromedioRegistros(l.registros, semana.inicio, semana.fin);
      const pMes = calcularPromedioRegistros(l.registros, mes.inicio, mes.fin);
      const delta = (pSem != null && pMes != null) ? parseFloat((pSem - pMes).toFixed(1)) : null;
      const huevosSem = semRegistros.reduce((s,r) => {
        // recuperar del registro raw no disponible aquí, usamos postura×aves como estimado
        return s;
      }, 0);

      // Estado semáforo
      const diasConDatos = semRegistros.length;
      const incompleto = diasConDatos < 5;
      let color, etiq;
      if (incompleto)        { color='#e65100'; etiq='Incompleto'; }
      else if (pSem==null)   { color='#888';    etiq='Sin datos';  }
      else if (delta>= 0)    { color='#1b5e20'; etiq='Sobre curva';}
      else if (delta >= -2)  { color='#f9a825'; etiq='Leve baja';  }
      else                   { color='#b71c1c'; etiq='Bajo curva'; }

      const fila = document.createElement('div');
      fila.className = 'resumen-fila' + (incompleto ? ' resumen-pendiente' : '');

      // Productor / Lote
      const cProd = document.createElement('div'); cProd.className='resumen-cel';
      cProd.innerHTML=`<div class="resumen-productor" style="color:${g.color}">${g.nombre}</div><div class="resumen-lote">${l.nombre}</div>`;

      // Estado
      const cEstado = document.createElement('div'); cEstado.className='resumen-cel';
      cEstado.innerHTML=`<div class="semaforo"><div class="semaforo-dot" style="background:${color}"></div><span style="color:${color}">${etiq}</span></div>`;

      // Sem vida
      const cSem = document.createElement('div'); cSem.className='resumen-cel';
      cSem.innerHTML=`<div class="resumen-num" style="color:var(--prim)">${l.semanaVida||'—'}</div><div class="resumen-sub">semanas</div>`;

      // Postura semana
      const cPSem = document.createElement('div'); cPSem.className='resumen-cel';
      cPSem.innerHTML=pSem!=null
        ?`<div class="resumen-num" style="color:${color}">${pSem}%</div><div class="resumen-sub">${diasConDatos} día${diasConDatos!==1?'s':''} registrados</div>`
        :`<div style="color:var(--tenue);font-size:13px">Sin datos</div>`;

      // Postura mes anterior
      const cPMes = document.createElement('div'); cPMes.className='resumen-cel';
      cPMes.innerHTML=pMes!=null
        ?`<div class="resumen-num" style="color:var(--suave)">${pMes}%</div><div class="resumen-sub">${mesRegistros.length} días</div>`
        :`<div style="color:var(--tenue);font-size:13px">Sin datos</div>`;

      // Delta
      const cDelta = document.createElement('div'); cDelta.className='resumen-cel';
      if (delta != null) {
        const bg = delta>=0?'rgba(27,94,32,.1)':'rgba(183,28,28,.1)';
        const col= delta>=0?'var(--ok)':'var(--mal)';
        cDelta.innerHTML=`<span class="delta-chip" style="background:${bg};color:${col}">${delta>0?'+':''}${delta}%</span>`;
      } else {
        cDelta.innerHTML=`<span style="color:var(--tenue)">—</span>`;
      }

      // Huevos semana
      const cHuevos = document.createElement('div'); cHuevos.className='resumen-cel';
      const totalHuevosSem = semRegistros.reduce((s,r) => s + (r.n_huevos||0), 0);
      cHuevos.innerHTML=totalHuevosSem>0
        ?`<div class="resumen-num" style="color:var(--prim);font-size:18px">${totalHuevosSem.toLocaleString('es-CL')}</div><div class="resumen-sub">${diasConDatos} días</div>`
        :`<div style="font-size:12px;color:var(--tenue)">${diasConDatos} días<br>con datos</div>`;

      fila.append(cProd, cEstado, cSem, cPSem, cPMes, cDelta, cHuevos);
      grid.appendChild(fila);
    });
  });

  if (!hayDatos) {
    const vacia = document.createElement('div');
    vacia.className='resumen-fila';
    vacia.style.cssText='grid-column:1/-1;padding:32px;color:var(--tenue);text-align:center;font-size:13px';
    vacia.textContent='No hay datos cargados aún. Espera que termine de cargar.';
    grid.appendChild(vacia);
  }
  wrap.appendChild(grid);

  // Pie explicativo
  const pie = document.createElement('div'); pie.className='resumen-pie';
  pie.innerHTML=`<strong>Período:</strong> ${fmtFecha(semana.inicio)} al ${fmtFecha(semana.fin)} &nbsp;·&nbsp; <strong>Comparación:</strong> promedio ${mes.etiqueta} &nbsp;·&nbsp; <strong>Gracia:</strong> 3 días posterior al domingo de la semana &nbsp;·&nbsp; Los datos de postura son el promedio de los días registrados en el período.`;
  wrap.appendChild(pie);

  main.appendChild(wrap);
}

function copiarResumenTexto(semana, mes) {
  const fmtFecha = s => new Date(s+'T12:00:00').toLocaleDateString('es-CL', {day:'numeric',month:'short'});
  let txt = `RESUMEN SEMANAL AVIVET\n`;
  txt += `Período: ${fmtFecha(semana.inicio)} – ${fmtFecha(semana.fin)}\n`;
  txt += `Comparación: ${mes.etiqueta}\n`;
  txt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  GRANJAS.forEach(g => {
    const d = state.datos[g.id]; if (!d) return;
    txt += `▸ ${g.nombre}\n`;
    d.lotes.forEach(l => {
      const semRegs  = l.registros.filter(r => r.fecha >= semana.inicio && r.fecha <= semana.fin);
      const pSem = calcularPromedioRegistros(l.registros, semana.inicio, semana.fin);
      const pMes = calcularPromedioRegistros(l.registros, mes.inicio, mes.fin);
      const delta = (pSem!=null&&pMes!=null) ? (pSem-pMes).toFixed(1) : null;
      txt += `  ${l.nombre} — Sem ${l.semanaVida||'?'}\n`;
      txt += `  Postura semana: ${pSem!=null?pSem+'%':'Sin datos'} (${semRegs.length} días)\n`;
      txt += `  Promedio ${mes.etiqueta}: ${pMes!=null?pMes+'%':'Sin datos'}\n`;
      const huevos = semRegs.reduce((s,r)=>s+(r.n_huevos||0),0);
      txt += `  Huevos semana: ${huevos>0?huevos.toLocaleString('es-CL'):'—'}\n`;
      txt += `  Diferencia vs mes: ${delta!=null?(delta>0?'+':'')+delta+'%':'—'}\n\n`;
    });
  });

  txt += `\nAviVet.cl · Dr. Andrés Lazo Escobar, MV`;
  navigator.clipboard.writeText(txt).then(() => {
    alert('Resumen copiado al portapapeles.');
  }).catch(() => {
    prompt('Copia este texto:', txt);
  });
}

async function cargarDatos() {
  try {
    const lotes = await sbFetch('lotes', {'activo':'eq.true','select':'*','order':'nombre.asc'});
    const porUsuario = {};
    lotes.forEach(l => {
      if (!porUsuario[l.user_id]) porUsuario[l.user_id] = {uid:l.user_id, nombre:l.productor||l.user_id.slice(0,8), lotes:[]};
      porUsuario[l.user_id].lotes.push(l);
    });
    GRANJAS = Object.values(porUsuario)
      .sort((a,b)=>a.nombre.localeCompare(b.nombre))
      .map((g,i)=>({ id:g.uid, nombre:g.nombre, color:PALETTE[i%PALETTE.length], _lotes:g.lotes }));
    if (GRANJAS.length) state.granjaId = GRANJAS[0].id;
    GRANJAS.forEach(g => { state.estados[g.id]='cargando'; });
    render();

    for (const granja of GRANJAS) {
      try {
        const lotesData = [];
        for (const lote of granja._lotes) {
          // Traer hasta 365 registros para soportar vistas semanal y mensual
          const regs = await sbFetch('registros', {
            'lote_id': 'eq.'+lote.id,
            'select':  'fecha,semana_vida,n_aves,mortalidad,kg_alimento,n_huevos,chico,mediano,grande,xl,super_xl,jumbo,sucios,rotos,trizados,sangre,pct_postura,pct_esperado,diferencia',
            'order':   'fecha.desc',
            'limit':   '365',
          });
          const p = procesarLote(lote, regs);
          if (p) lotesData.push(p);
        }
        state.datos[granja.id] = { fechaConsulta: new Date().toISOString().slice(0,10), lotes: lotesData };
        state.estados[granja.id] = 'ok';
      } catch(e) { state.estados[granja.id]='error'; }
      render();
    }
  } catch(e) {
    console.error('Error:', e);
    document.getElementById('contenido').innerHTML =
      `<div class="estado-msg"><div style="font-size:28px">⚠</div><div class="estado-msg-titulo" style="color:var(--mal)">Error al conectar</div><div class="estado-msg-sub">${e.message}</div></div>`;
  }
}
</script>
